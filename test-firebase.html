<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Firebase Test | Kagona PrimeNest</title>
<link rel="stylesheet" href="property.css">

</head>

<body>

<section class="properties">

<!-- HEADER -->
<div class="sticky-header">

<h2 class="section-title">Firebase Properties (Test)</h2>

<div class="property-filters">

<div class="currency-switch">🌍</div>

<select id="currencySelect" class="currency-dropdown">
  <option value="USD">USD ($)</option>
  <option value="KES">KES (KSh)</option>
  <option value="EUR">EUR (€)</option>
  <option value="GBP">GBP (£)</option>
</select>

<input type="text" id="searchInput" placeholder="Search location...">

<select id="priceFilter">
<option value="">Price</option>
<option value="100000">$100K+</option>
<option value="300000">$300K+</option>
<option value="500000">$500K+</option>
<option value="1000000">$1M+</option>
</select>

<select id="typeFilter">
<option value="">Property Type</option>
<option value="house">House</option>
<option value="villa">Villa</option>
<option value="smart-home">Smart Home</option>
</select>

</div>
</div>

<!-- GRID -->
<div class="property-grid" id="propertyGrid">

<!-- 🔒 STATIC BACKUP (SAFE MODE) -->
<div class="property-card">
<div class="property-image">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<span class="property-badge">Static</span>
<button class="favorite-btn">❤</button>
</div>

<div class="property-info">
<h3>Static Test House</h3>
<p class="property-location">📍 Nairobi</p>

<div class="property-features">
<span>🛏 4 Beds</span>
<span>🛁 3 Baths</span>
<span>📐 400 sqm</span>
</div>

<div class="property-bottom">
<span class="property-price" data-price="500000">$500,000</span>
<button>View Details</button>
</div>
</div>
</div>

</div>

</section>

<!-- ================= FILTER SYSTEM ================= -->
<script>

const searchInput = document.getElementById("searchInput");
const priceFilter = document.getElementById("priceFilter");
const typeFilter = document.getElementById("typeFilter");

function filterProperties(){

const cards = document.querySelectorAll(".property-card");

const search = searchInput.value.toLowerCase();
const price = priceFilter.value;
const type = typeFilter.value;

cards.forEach(card => {

const location = card.querySelector(".property-location").innerText.toLowerCase();
const cardPrice = parseInt(card.querySelector(".property-price").getAttribute("data-price"));

let show = true;

if(search && !location.includes(search)) show = false;
if(price && cardPrice < parseInt(price)) show = false;
if(type && !card.innerText.toLowerCase().includes(type)) show = false;

card.style.display = show ? "block" : "none";

});

}

searchInput.addEventListener("input", filterProperties);
priceFilter.addEventListener("change", filterProperties);
typeFilter.addEventListener("change", filterProperties);

</script>

<!-- ================= CURRENCY SYSTEM ================= -->
<script>

const switchBtn = document.querySelector(".currency-switch");
const dropdown = document.getElementById("currencySelect");

switchBtn.onclick = () => {
  dropdown.classList.toggle("show");
};

let currentCurrency = localStorage.getItem("currency") || "USD";
let rates = {};

async function getRates() {
  const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
  const data = await res.json();
  rates = data.rates;
  updatePrices();
}

function updatePrices() {

  document.querySelectorAll(".property-price").forEach(el => {

    const basePrice = parseInt(el.getAttribute("data-price"));
    let finalPrice = basePrice;

    if(currentCurrency !== "USD" && rates[currentCurrency]) {
      finalPrice = basePrice * rates[currentCurrency];
    }

    let symbol = "$";

    if(currentCurrency === "KES") symbol = "KSh ";
    if(currentCurrency === "EUR") symbol = "€";
    if(currentCurrency === "GBP") symbol = "£";

    el.innerText = symbol + Math.round(finalPrice).toLocaleString();

  });

}

dropdown.addEventListener("change", () => {
  currentCurrency = dropdown.value;
  localStorage.setItem("currency", currentCurrency);
  updatePrices();
});

getRates();

</script>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZvAcMFt1n5RBfWmiCMvcZcAQvDs7rzhk",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest",
  storageBucket: "kagona-primenest.firebasestorage.app",
  messagingSenderId: "246677583786",
  appId: "1:246677583786:web:ceced78ad633539a8c1dd3",
  measurementId: "G-GRSTNZKJVB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProperties() {

  const grid = document.getElementById("propertyGrid");

  const querySnapshot = await getDocs(collection(db, "properties"));

  querySnapshot.forEach((doc) => {

    const p = doc.data();

    const card = `
      <div class="property-card">

        <div class="property-image">
          <img src="${p.image}">
          ${p.badge ? `<span class="property-badge">${p.badge}</span>` : ""}
          <button class="favorite-btn">❤</button>
        </div>

        <div class="property-info">
          <h3>${p.title}</h3>
          <p class="property-location">📍 ${p.location}</p>

          <div class="property-features">
            <span>🛏 ${p.beds} Beds</span>
            <span>🛁 ${p.baths} Baths</span>
            <span>📐 ${p.size} sqm</span>
          </div>

          <div class="property-bottom">
            <span class="property-price" data-price="${p.price}">
              $${Number(p.price).toLocaleString()}
            </span>

            <button onclick="location.href='${p.link}'">
              View Details
            </button>
          </div>
        </div>

      </div>
    `;

    grid.innerHTML += card;

  });

  updatePrices(); // 🔥 VERY IMPORTANT

}

loadProperties();

</script>

</body>
</html>
