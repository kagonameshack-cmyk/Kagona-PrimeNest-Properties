<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mortgage Calculator | Kagona PrimeNest</title>

<style>

/* GENERAL */
body {
  font-family: Arial, sans-serif;
  background: #0c0c0c;
  color: white;
  margin: 0;
}

/* HEADER */
.header {
  padding: 20px;
  background: black;
  color: #d4af37;
  font-size: 22px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

/* TITLE */
h1 {
  text-align: center;
  color: #d4af37;
}

/* INPUTS */
.input-group {
  margin-bottom: 18px;
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-top: 6px;
  font-size: 16px;
}

/* RESULT CARD */
.result-card {
  background: #111;
  border-radius: 15px;
  padding: 20px;
  margin-top: 25px;
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
}

.result-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}

.result-item span {
  opacity: 0.7;
}

/* INFO BOX */
.info-box {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  font-size: 14px;
  display: none;
}

/* LIVE DOT */
.live {
  color: #d4af37;
  font-size: 12px;
}

.live::before {
  content: "●";
  color: red;
  margin-right: 5px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {opacity: 0.3;}
  50% {opacity: 1;}
  100% {opacity: 0.3;}
}

</style>

</head>

<body>

<div class="header">Kagona PrimeNest</div>

<div class="container">

<h1>Mortgage Calculator</h1>

<!-- CURRENCY -->
<div class="input-group">
<label>Select Currency</label>
<select id="currency">
<option value="USD">USD ($)</option>
<option value="KES">KES (KSh)</option>
<option value="EUR">EUR (€)</option>
</select>
</div>

<!-- PROPERTY PRICE -->
<div class="input-group">
<label>Property Price</label>
<input type="number" id="price" placeholder="Enter property price">
</div>

<!-- DOWN PAYMENT -->
<div class="input-group">
<label>How much will you pay upfront?</label>
<input type="number" id="down">
</div>

<!-- INTEREST -->
<div class="input-group">
<label>Interest Rate (%)</label>
<input type="number" id="rate" placeholder="Example: 7">
</div>

<!-- YEARS -->
<div class="input-group">
<label>How many years to repay?</label>
<input type="number" id="years" placeholder="Example: 20">
</div>

<!-- INFO -->
<button onclick="toggleInfo()">ℹ️ Understand this</button>

<div class="info-box" id="infoBox">
<p><b>Down Payment:</b> Money you pay first before taking a loan.</p>
<p><b>Interest Rate:</b> What the bank charges you.</p>
<p><b>Loan Period:</b> How long you take to pay back.</p>
</div>

<!-- RESULTS -->
<div class="result-card">

<div class="live">Live Calculation</div>

<div class="result-item">
<span>Monthly Payment</span>
<b id="monthly">-</b>
</div>

<div class="result-item">
<span>Total Payment</span>
<b id="total">-</b>
</div>

<div class="result-item">
<span>Total Interest</span>
<b id="interest">-</b>
</div>

</div>

</div>

<script>

/* SIMPLE STATIC RATES (UPGRADE TO API LATER) */
const rates = {
  USD: 1,
  KES: 130,
  EUR: 0.92
};

const currencySymbols = {
  USD: "$",
  KES: "KSh",
  EUR: "€"
};

const inputs = document.querySelectorAll("input, select");

inputs.forEach(input => {
  input.addEventListener("input", calculate);
  input.addEventListener("change", calculate);
});

function calculate(){

  let price = parseFloat(document.getElementById("price").value) || 0;
  let down = parseFloat(document.getElementById("down").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let years = parseFloat(document.getElementById("years").value) || 0;
  let currency = document.getElementById("currency").value;

  if(price <= 0 || years <= 0) return;

  let loan = price - down;
  let monthlyRate = rate / 100 / 12;
  let payments = years * 12;

  let monthly = (loan * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -payments));
  let total = monthly * payments;
  let interest = total - loan;

  /* CONVERT */
  let convert = rates[currency];
  let symbol = currencySymbols[currency];

  monthly *= convert;
  total *= convert;
  interest *= convert;

  document.getElementById("monthly").innerText = symbol + " " + format(monthly);
  document.getElementById("total").innerText = symbol + " " + format(total);
  document.getElementById("interest").innerText = symbol + " " + format(interest);

}

function format(num){
  return num.toLocaleString(undefined, {maximumFractionDigits:0});
}

function toggleInfo(){
  const box = document.getElementById("infoBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
