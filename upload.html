<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Property | Kagona Admin</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: #fff;
}

textarea {
  min-height: 100px;
}

button {
  width: 100%;
  padding: 14px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.small-btn {
  margin-top: 5px;
  background: #333;
}

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

.status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Add Property</h1>

<form id="form">

<input id="title" placeholder="Title" required>

<select id="category" required>
<option value="">Category</option>
<option value="houses">Houses</option>
<option value="apartments">Apartments</option>
<option value="villas">Villas</option>
<option value="beachhomes">Beachhomes</option>
<option value="lands">Lands</option>
</select>

<select id="badge">
<option value="">Select Badge</option>
</select>

<input id="location" placeholder="Location" required>

<select id="currency" id="currency">
<option value="USD">USD ($)</option>
<option value="KES">KES (KSh)</option>
<option value="EUR">EUR (€)</option>
<option value="GBP">GBP (£)</option>
</select>

<input type="number" id="price" placeholder="Price" required>

<input type="number" id="beds" placeholder="Beds">
<input type="number" id="baths" placeholder="Baths">
<input type="number" id="size" placeholder="Size">
  
<!-- MAIN IMAGE -->
<h3>Main Image</h3>
<input id="imageUrl" placeholder="Paste Image URL">
<input type="file" id="imageFile">

<img id="preview" class="preview">

!-- LINK -->
<div style="display:flex; gap:10px;">
<input id="link" placeholder="Details Page Link">
<button type="button" id="autoLink">Auto</button>
</div>
  
<!-- GALLERY -->
<h3>Gallery</h3>
<div id="galleryInputs"></div>
<button type="button" class="small-btn" id="addImage">+ Add Image</button>

<!-- DESCRIPTION -->
<h3>Description</h3>
<textarea id="description"></textarea>

<!-- VIDEO -->
<h3>Video</h3>
<input id="videoUrl" placeholder="Paste video URL">
<input type="file" id="videoFile">

<button type="submit">Upload Property</button>

</form>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest",
  storageBucket: "kagona-primenest.firebasestorage.app",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ========= BADGE ========= */
const badgeOptions = {
  houses: ["Featured","Luxury","Smart Home"],
  apartments: ["City View","Modern","Affordable"],
  villas: ["Pool Villa","Sea View","Private"],
  beachhomes: ["Oceanfront","Resort Style"],
  lands: ["Residential","Commercial","Investment"]
};

const category = document.getElementById("category");
const badge = document.getElementById("badge");

category.addEventListener("change", () => {
  badge.innerHTML = "<option>Select Badge</option>";
  badgeOptions[category.value]?.forEach(b => {
    badge.innerHTML += `<option value="${b}">${b}</option>`;
  });
});

/* ========= IMAGE PREVIEW ========= */
const imageFile = document.getElementById("imageFile");
const preview = document.getElementById("preview");

imageFile.addEventListener("change", () => {
  const file = imageFile.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
  }
});

/* ========= AUTO LINK ========= */
document.getElementById("autoLink").onclick = () => {
  const title = document.getElementById("title").value;
  const slug = title.toLowerCase().replace(/ /g,"-");
  document.getElementById("link").value = `property.html?name=${slug}`;
};
  
/* ========= GALLERY ========= */
const galleryContainer = document.getElementById("galleryInputs");

document.getElementById("addImage").onclick = () => {
  const wrapper = document.createElement("div");

  wrapper.innerHTML = `
    <input placeholder="Image URL">
    <input type="file">
  `;

  galleryContainer.appendChild(wrapper);
};

/* ========= UPLOAD FUNCTION ========= */
async function uploadFile(file, path){
  const storageRef = ref(storage, path + Date.now());
  await uploadBytes(storageRef, file);
  return await getDownloadURL(storageRef);
}

/* ========= FORM ========= */
const form = document.getElementById("form");
const status = document.getElementById("status");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  try{

    status.innerHTML = "Uploading...";

    // MAIN IMAGE
    let mainImage = document.getElementById("imageUrl").value;

    if(imageFile.files[0]){
      mainImage = await uploadFile(imageFile.files[0], "images/");
    }

    // GALLERY
    const galleryItems = galleryContainer.children;
    const images = [];

    for(let item of galleryItems){
      const urlInput = item.querySelector("input[type=text]");
      const fileInput = item.querySelector("input[type=file]");

      if(fileInput.files[0]){
        const uploaded = await uploadFile(fileInput.files[0], "gallery/");
        images.push(uploaded);
      } else if(urlInput.value){
        images.push(urlInput.value);
      }
    }

    // VIDEO
    let video = document.getElementById("videoUrl").value;

    const videoFile = document.getElementById("videoFile");
    if(videoFile.files[0]){
      video = await uploadFile(videoFile.files[0], "videos/");
    }

    // SAVE TO FIRESTORE
    await addDoc(collection(db,"properties"),{

      title: title.value,
      category: category.value,
      badge: badge.value,
      location: location.value,

      price: Number(price.value),
      currency: currency.value,

      beds: Number(beds.value || 0),
      baths: Number(baths.value || 0),
      size: Number(size.value || 0),

      image: mainImage,
      images: images,

      description: description.value,
      video: video

    });

    status.innerHTML = "✅ Uploaded successfully!";
    form.reset();
    galleryContainer.innerHTML = "";

  }catch(err){
    console.error(err);
    status.innerHTML = "❌ Upload failed";
  }

});

</script>

</body>
</html>
