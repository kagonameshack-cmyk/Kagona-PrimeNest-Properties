<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Property | Kagona Admin</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

.form-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: #fff;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

button {
  width: 100%;
  padding: 14px;
  background: gold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.small-btn {
  margin-top: 5px;
  background: #333;
}

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

.status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Add Property</h1>

<form id="form">

<input id="title" placeholder="Title" required>

<select id="category" required>
<option value="">Category</option>
<option value="houses">Houses</option>
<option value="apartments">Apartments</option>
<option value="villas">Villas</option>
<option value="beachhomes">Beachhomes</option>
<option value="land">Land</option>
</select>

<select id="badge">
<option value="">Select Badge</option>
</select>

<input id="location" placeholder="Location" required>

<select id="currency">
<option value="USD">USD ($)</option>
<option value="KES">KES (KSh)</option>
<option value="EUR">EUR (€)</option>
<option value="GBP">GBP (£)</option>
</select>

<input type="number" id="price" placeholder="Price (number only)" required>

<input type="number" id="beds" placeholder="Beds">
<input type="number" id="baths" placeholder="Baths">
<input type="number" id="size" placeholder="Size">

<!-- MAIN IMAGE -->
<h3>Main Image</h3>
<input id="imageUrl" placeholder="Paste Image URL">

<!-- GALLERY -->
<h3>Gallery Images</h3>
<div id="galleryInputs"></div>
<button type="button" class="small-btn" id="addImage">+ Add Image</button>

<!-- DESCRIPTION -->
<h3>Description</h3>
<textarea id="description" placeholder="Write property description..."></textarea>

<!-- VIDEO -->
<h3>Video Tour (YouTube embed link)</h3>
<input id="video" placeholder="https://www.youtube.com/embed/...">

<button type="submit">Upload Property</button>

</form>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ========= BADGE ========= */
const badgeOptions = {
  houses: ["Featured","Luxury","Smart Home"],
  apartments: ["City View","Modern","Affordable"],
  villas: ["Pool Villa","Sea View","Private"],
  beachhomes: ["Oceanfront","Resort Style"],
  land: ["Residential","Commercial","Investment"]
};

const category = document.getElementById("category");
const badge = document.getElementById("badge");

category.addEventListener("change", () => {
  badge.innerHTML = "<option>Select Badge</option>";
  badgeOptions[category.value]?.forEach(b => {
    badge.innerHTML += `<option value="${b}">${b}</option>`;
  });
});

/* ========= GALLERY ========= */
const galleryContainer = document.getElementById("galleryInputs");

document.getElementById("addImage").onclick = () => {
  const input = document.createElement("input");
  input.placeholder = "Paste image URL";
  galleryContainer.appendChild(input);
};

/* ========= FORM ========= */
const form = document.getElementById("form");
const status = document.getElementById("status");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  try{

    // Collect gallery images
    const galleryInputs = galleryContainer.querySelectorAll("input");
    const images = [];

    galleryInputs.forEach(i => {
      if(i.value) images.push(i.value);
    });

    await addDoc(collection(db,"properties"),{

      title: title.value,
      category: category.value,
      badge: badge.value,
      location: location.value,

      price: Number(price.value),
      currency: currency.value,

      beds: Number(beds.value || 0),
      baths: Number(baths.value || 0),
      size: Number(size.value || 0),

      image: imageUrl.value,
      images: images,

      description: description.value,
      video: video.value

    });

    status.innerHTML = "✅ Property uploaded successfully!";
    form.reset();
    galleryContainer.innerHTML = "";

  }catch(err){
    status.innerHTML = "❌ Error uploading";
    console.error(err);
  }

});

</script>

</body>
</html>
