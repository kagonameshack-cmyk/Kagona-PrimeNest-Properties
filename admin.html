<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Upload | Kagona PrimeNest</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 30px;
}

h2 {
  margin-bottom: 20px;
}

form {
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, select, button {
  padding: 12px;
  border-radius: 8px;
  border: none;
}

input, select {
  background: #1a1a1a;
  color: white;
}

button {
  background: gold;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<h2>Upload Property</h2>

<form id="uploadForm">

<input type="text" id="title" placeholder="Property Title" required>

<select id="category" required>
  <option value="">Select Category</option>
  <option value="houses">Houses</option>
  <option value="apartments">Apartments</option>
  <option value="villas">Villas</option>
  <option value="land">Land</option>
</select>

<input type="text" id="location" placeholder="Location" required>
<input type="number" id="price" placeholder="Price (USD)" required>

<input type="number" id="beds" placeholder="Beds">
<input type="number" id="baths" placeholder="Baths">
<input type="number" id="size" placeholder="Size (sqm)">

<input type="text" id="badge" placeholder="Badge (Optional)">
<input type="text" id="link" placeholder="Details Page Link">

<!-- IMAGE FILE -->
<input type="file" id="imageFile" accept="image/*" required>

<button type="submit">Upload Property</button>

</form>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const form = document.getElementById("uploadForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("imageFile").files[0];

  if(!file){
    alert("Please select an image");
    return;
  }

  // Upload image to Firebase Storage
  const storageRef = ref(storage, "properties/" + Date.now() + "_" + file.name);

  await uploadBytes(storageRef, file);

  const imageURL = await getDownloadURL(storageRef);

  // Save property to Firestore
  await addDoc(collection(db, "properties"), {
    title: document.getElementById("title").value,
    category: document.getElementById("category").value,
    location: document.getElementById("location").value,
    price: parseInt(document.getElementById("price").value),
    beds: parseInt(document.getElementById("beds").value) || 0,
    baths: parseInt(document.getElementById("baths").value) || 0,
    size: parseInt(document.getElementById("size").value) || 0,
    badge: document.getElementById("badge").value || "",
    link: document.getElementById("link").value || "#",
    image: imageURL
  });

  alert("✅ Property uploaded successfully!");

  form.reset();
});

</script>

</body>
</html>
