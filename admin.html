<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Kagona PrimeNest</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* ===== LAYOUT ===== */
.dashboard {
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #111;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  color: gold;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 15px 0;
  transition: 0.3s;
}

.sidebar a:hover {
  color: gold;
}

/* ===== MAIN ===== */
.main {
  margin-left: 260px;
  padding: 30px;
  width: 100%;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  margin: 0;
}

/* ===== CARDS ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin: 0;
  font-size: 18px;
  color: #aaa;
}

.card p {
  font-size: 28px;
  margin-top: 10px;
  color: gold;
}

/* ===== ACTION BUTTONS ===== */
.actions {
  margin-top: 40px;
}

.actions button {
  padding: 12px 20px;
  margin-right: 10px;
  border: none;
  border-radius: 8px;
  background: gold;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

.actions button:hover {
  opacity: 0.8;
}

/* ===== TABLE PREVIEW ===== */
.table {
  margin-top: 40px;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 20px;
}

.table h3 {
  margin-bottom: 20px;
}

.table-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #333;
}

</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Kagona Admin</h2>

    <a href="#">Dashboard</a>
    <a href="upload.html">Add Property</a>
    <a href="manage.html">Manage Properties</a>
    <a href="#">Gallery</a>
    <a href="#">Settings</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>Dashboard</h1>
      <p>Welcome back 👋</p>
    </div>

    <!-- STATS -->
    <div class="cards">
      <div class="card">
        <h3>Total Properties</h3>
        <p id="totalProps">--</p>
      </div>

      <div class="card">
        <h3>Houses</h3>
        <p id="housesCount">--</p>
      </div>

      <div class="card">
        <h3>Apartments</h3>
        <p id="apartmentsCount">--</p>
      </div>

      <div class="card">
        <h3>Villas</h3>
        <p id="villasCount">--</p>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="location.href='upload.html'">+ Add Property</button>
      <button onclick="location.href='manage.html'">Manage Properties</button>
    </div>

    <!-- RECENT PREVIEW -->
    <div class="table">
      <h3>Recent Properties</h3>

      <div id="recentList">
        <div class="table-item">
          <span>Loading...</span>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ YOUR REAL CONFIG (CONNECTED)
const firebaseConfig = {
  apiKey: "AIzaSyDZvAcMFt1n5RBfWmiCMvcZcAQvDs7rzhk",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest",
  storageBucket: "kagona-primenest.firebasestorage.app",
  messagingSenderId: "246677583786",
  appId: "1:246677583786:web:ceced78ad633539a8c1dd3",
  measurementId: "G-GRSTNZKJVB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadDashboard() {

  const snapshot = await getDocs(collection(db, "properties"));

  let total = 0;
  let houses = 0;
  let apartments = 0;
  let villas = 0;

  let recentHTML = "";

  snapshot.forEach(doc => {
    const p = doc.data();

    total++;

    if(p.category === "houses") houses++;
    if(p.category === "apartments") apartments++;
    if(p.category === "villas") villas++;

    recentHTML += `
      <div class="table-item">
        <span>${p.title}</span>
        <span>${p.category}</span>
      </div>
    `;
  });

  document.getElementById("totalProps").innerText = total;
  document.getElementById("housesCount").innerText = houses;
  document.getElementById("apartmentsCount").innerText = apartments;
  document.getElementById("villasCount").innerText = villas;

  document.getElementById("recentList").innerHTML = recentHTML || "No data";

}

loadDashboard();

</script>

</body>
  </html>
