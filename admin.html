<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Kagona PrimeNest</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* ===== LAYOUT ===== */
.dashboard {
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  height: 100vh;
  background: linear-gradient(180deg, #111, #0a0a0a);
  padding: 20px;
  position: fixed;
  border-right: 1px solid #222;
}

.sidebar h2 {
  color: gold;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  color: #aaa;
  text-decoration: none;
  margin: 15px 0;
  transition: 0.3s;
}

.sidebar a:hover {
  color: gold;
}

/* ===== MAIN ===== */
.main {
  margin-left: 260px;
  padding: 30px;
  width: 100%;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== CARDS ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #bbb;
}

.card p {
  font-size: 26px;
  margin-top: 10px;
  color: gold;
}

/* ===== ACTIONS ===== */
.actions {
  margin-top: 40px;
}

.actions button {
  padding: 12px 20px;
  margin-right: 10px;
  border: none;
  border-radius: 8px;
  background: gold;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.actions button:hover {
  opacity: 0.8;
}

/* ===== TABLE ===== */
.table {
  margin-top: 40px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

.table h3 {
  margin-bottom: 20px;
}

.table-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #222;
}

.table-item span:last-child {
  text-transform: capitalize;
  color: gold;
}

/* ===== LOADING ===== */
.loading {
  opacity: 0.6;
  font-style: italic;
}

</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Kagona Admin</h2>

    <a href="#">Dashboard</a>
    <a href="upload.html">Add Property</a>
    <a href="manage.html">Manage Properties</a>
    <a href="#">Gallery</a>
    <a href="#">Settings</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>Dashboard</h1>
      <p>Welcome back 👋</p>
    </div>

    <!-- STATS -->
    <div class="cards">
      <div class="card"><h3>Total Properties</h3><p id="totalProps">--</p></div>
      <div class="card"><h3>Houses</h3><p id="housesCount">--</p></div>
      <div class="card"><h3>Apartments</h3><p id="apartmentsCount">--</p></div>
      <div class="card"><h3>Villas</h3><p id="villasCount">--</p></div>
      <div class="card"><h3>Beachhomes</h3><p id="beachhomesCount">--</p></div>
      <div class="card"><h3>Land</h3><p id="landsCount">--</p></div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="location.href='upload.html'">+ Add Property</button>
      <button onclick="location.href='manage.html'">Manage Properties</button>
    </div>

    <!-- RECENT -->
    <div class="table">
      <h3>Recent Properties</h3>
      <div id="recentList" class="loading">Loading...</div>
    </div>

  </div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZvAcMFt1n5RBfWmiCMvcZcAQvDs7rzhk",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest",
  storageBucket: "kagona-primenest.firebasestorage.app",
  messagingSenderId: "246677583786",
  appId: "1:246677583786:web:ceced78ad633539a8c1dd3",
  measurementId: "G-GRSTNZKJVB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadDashboard() {

  try {

    const snapshot = await getDocs(collection(db, "properties"));

    let total = 0, houses = 0, apartments = 0, villas = 0, beachhomes = 0, land = 0;

    let html = "";
    let count = 0;

    snapshot.forEach(doc => {

      const p = doc.data();
      total++;

      if(p.category === "houses") houses++;
      if(p.category === "apartments") apartments++;
      if(p.category === "villas") villas++;
      if(p.category === "beachhomes") beachhomes++;
      if(p.category === "land") land++;

      if(count < 5) {
        html += `
          <div class="table-item">
            <span>${p.title}</span>
            <span>${p.category}</span>
          </div>
        `;
        count++;
      }

    });

    document.getElementById("totalProps").innerText = total;
    document.getElementById("housesCount").innerText = houses;
    document.getElementById("apartmentsCount").innerText = apartments;
    document.getElementById("villasCount").innerText = villas;
    document.getElementById("beachhomesCount").innerText = beachhomes;
    document.getElementById("landsCount").innerText = land;

    document.getElementById("recentList").innerHTML = html || "No properties yet.";

  } catch (err) {
    console.error(err);
    document.getElementById("recentList").innerHTML = "Error loading data.";
  }

}

loadDashboard();

</script>

</body>
  </html>
