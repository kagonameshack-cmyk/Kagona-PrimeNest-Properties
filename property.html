<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property Details | Kagona PrimeNest</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

/* IMAGE */
.main-img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  border-radius: 12px;
}

/* GALLERY */
.gallery {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.gallery img {
  width: 120px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* INFO */
h1 {
  margin-top: 20px;
}

.price {
  font-size: 26px;
  color: gold;
}

.features {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

.description {
  margin-top: 20px;
  line-height: 1.6;
}

/* VIDEO */
.video {
  margin-top: 20px;
}

.video iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

  <img id="mainImage" class="main-img">

  <div class="gallery" id="gallery"></div>

  <h1 id="title">Loading...</h1>
  <p id="location"></p>
  <p class="price" id="price"></p>

  <div class="features">
    <span id="beds"></span>
    <span id="baths"></span>
    <span id="size"></span>
  </div>

  <div class="description" id="description"></div>

  <div class="video" id="video"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kagona-primenest.firebaseapp.com",
  projectId: "kagona-primenest"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// LOAD DATA
async function loadProperty(){

  if(!id){
    document.body.innerHTML = "❌ No property ID";
    return;
  }

  const ref = doc(db, "properties", id);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    document.body.innerHTML = "❌ Property not found";
    return;
  }

  const p = snap.data();

  // BASIC INFO
  document.getElementById("title").innerText = p.title;
  document.getElementById("location").innerText = "📍 " + p.location;
  document.getElementById("price").innerText = p.currency + " " + p.price.toLocaleString();

  document.getElementById("beds").innerText = "🛏 " + (p.beds || 0);
  document.getElementById("baths").innerText = "🛁 " + (p.baths || 0);
  document.getElementById("size").innerText = "📐 " + (p.size || 0) + " sqm";

  // MAIN IMAGE
  document.getElementById("mainImage").src = p.image;

  // GALLERY
  if(p.images){
    const gallery = document.getElementById("gallery");

    p.images.forEach(img => {
      const el = document.createElement("img");
      el.src = img;

      el.onclick = () => {
        document.getElementById("mainImage").src = img;
      };

      gallery.appendChild(el);
    });
  }

  // DESCRIPTION
  document.getElementById("description").innerText = p.description || "";

  // VIDEO
  if(p.video){
    document.getElementById("video").innerHTML = `
      <iframe src="${p.video}" allowfullscreen></iframe>
    `;
  }

}

loadProperty();

</script>

</body>
</html>
